<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ADM Familia</title>

<style>
:root{--bg:#f1f5f9;--card:#fff;--navy:#0f172a;--navy2:#1e293b;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--green:#10b981;--green-bg:#d1fae5;--amber:#f59e0b;--amber-bg:#fef3c7;--red:#ef4444;--blue:#3b82f6;--r:12px;--sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
/* TOPBAR */
.topbar{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;gap:20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.logo{font-size:15px;font-weight:800;letter-spacing:2px;white-space:nowrap}.logo em{color:#60a5fa;font-style:normal}
.month-nav{display:flex;align-items:center;gap:10px;margin:0 auto}
.month-nav button{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:5px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:background .15s}
.month-nav button:hover{background:rgba(255,255,255,.25)}
.month-label{font-size:19px;font-weight:800;min-width:160px;text-align:center}
.sync-dot{font-size:11px;white-space:nowrap;opacity:.6}
.sync-dot.ok{color:#34d399;opacity:1}
.sync-dot.syncing{color:#fbbf24;opacity:1}
.sync-dot.err{color:#f87171;opacity:1}
/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 24px 8px}
.sc{background:var(--card);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);border:1px solid var(--border)}
.sc .lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.sc .val{font-size:22px;font-weight:800;line-height:1.1;color:var(--text)}
.sc .sub{font-size:11px;color:var(--muted);margin-top:3px}
.sc.paid .val{color:var(--green)}
.sc.pend .val{color:var(--amber)}
.pbar{margin-top:8px;background:var(--border);border-radius:99px;height:5px;overflow:hidden}
.pfill{height:100%;border-radius:99px;transition:width .6s ease}
.pfill.g{background:linear-gradient(90deg,#10b981,#34d399)}
.pfill.a{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
/* DOLLAR BAR */
.dollar-bar{display:flex;align-items:center;gap:8px;padding:8px 24px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap}
.rpill{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 12px}
.rpill .lbl{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted)}
.rpill input{font-size:15px;font-weight:700;width:88px;border:none;background:transparent;outline:none;color:var(--text)}
.rpill.b input{color:#2563eb}.rpill.o input{color:#059669}.rpill.m input{color:#d97706}
.btn-ref{background:#2563eb;color:#fff;border:none;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}
.btn-ref:hover{background:#1d4ed8}
.dtotals{display:flex;gap:14px;margin-left:auto;font-size:12px;flex-wrap:wrap}
.dtotals span{color:var(--muted)}.dtotals strong{color:var(--text)}
#lastUpdate{font-size:11px;color:#94a3b8}
/* ALERT */
.alert-bar{padding:10px 24px;font-size:13px;display:none;border-left:4px solid}
.alert-bar.danger{background:#fef2f2;border-color:var(--red);color:#991b1b;display:block}
.alert-bar.success{background:#f0fdf4;border-color:var(--green);color:#166534;display:block}
/* MAIN */
.main{display:grid;grid-template-columns:1fr 320px;min-height:calc(100vh - 220px)}
.lp{padding:16px 24px;border-right:1px solid var(--border)}
.rp{padding:14px;background:var(--bg)}
.ptitle{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px}
/* CATEGORY BLOCKS */
.cblock{background:var(--card);border-radius:var(--r);margin-bottom:10px;border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden}
.chdr{padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .1s;user-select:none}
.chdr:hover{background:#f8fafc}
.cdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cname{font-weight:600;font-size:13px;flex:1}
.cright{display:flex;flex-direction:column;align-items:flex-end;gap:2px;min-width:130px}
.ctotal{font-weight:800;font-size:14px}
.cpaidinfo{font-size:10px;color:var(--muted)}
.cpbar{width:90px;margin-top:3px}
.cchev{color:var(--muted);font-size:12px;transition:transform .2s;margin-left:4px}
.cchev.open{transform:rotate(180deg)}
/* ITEM ROWS */
.cbody{border-top:1px solid var(--border);padding:8px 16px 12px;display:none}
.cbody.open{display:block}
.ihr{display:grid;grid-template-columns:1fr 130px 80px 26px;gap:8px;padding:4px 0 8px;border-bottom:1px solid var(--border);margin-bottom:4px}
.ihr span{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted)}
.ir{display:grid;grid-template-columns:1fr 130px 80px 26px;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid #f1f5f9;transition:background .1s}
.ir:last-of-type{border-bottom:none}
.ir input[type=text]{font-size:13px;color:var(--text);border:none;background:transparent;outline:none;width:100%}
.ir input[type=text]:focus{background:#eff6ff;border-radius:4px;padding:2px 6px}
.ir input[type=number]{font-size:13px;text-align:right;border:1px solid var(--border);border-radius:6px;padding:4px 8px;width:100%;background:#fff;outline:none}
.ir input[type=number]:focus{border-color:var(--blue)}
/* PAID BUTTON */
.pbtn{display:flex;align-items:center;justify-content:center;padding:3px 6px;border-radius:20px;border:none;cursor:pointer;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.2px;transition:all .2s;white-space:nowrap;width:76px}
.pbtn.paid{background:var(--green-bg);color:#065f46}
.pbtn.pend{background:var(--amber-bg);color:#78350f}
.pbtn:hover{filter:brightness(.93)}
.bdel{background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:16px;line-height:1}
.bdel:hover{color:var(--red)}
.badd{background:none;border:1px dashed var(--border);color:var(--muted);border-radius:8px;padding:6px;cursor:pointer;font-size:12px;width:100%;margin-top:8px;transition:all .15s}
.badd:hover{border-color:var(--blue);color:var(--blue);background:#eff6ff}
/* RIGHT CARDS */
.rc{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:12px;border:1px solid var(--border);box-shadow:var(--sh)}
.rc h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px}
.crow{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px;border-bottom:1px solid #f1f5f9}
.crow:last-child{border-bottom:none}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700}
.badge.up{background:#fef2f2;color:#dc2626}
.badge.dn{background:#f0fdf4;color:#16a34a}
.badge.sm{background:#f1f5f9;color:var(--muted)}
/* FOOTER */
.footer{background:var(--card);border-top:1px solid var(--border);padding:10px 24px;display:flex;gap:8px;align-items:center}
.ba{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 14px;cursor:pointer;font-size:12px;color:var(--text);font-weight:500}
.ba:hover{background:var(--border)}
#statusBar{font-size:11px;color:var(--muted);margin-left:auto}
/* RESPONSIVE */
@media(max-width:900px){
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .main{grid-template-columns:1fr}
  .rp{border-top:1px solid var(--border)}
  .dtotals{display:none}
  .ihr,.ir{grid-template-columns:1fr 110px 72px 24px}
}
@media(max-width:500px){
  .stats-bar{grid-template-columns:1fr 1fr;gap:8px;padding:10px 14px 6px}
  .topbar{padding:0 14px}
  .lp{padding:10px 14px}
  .dollar-bar{padding:8px 14px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">&bull; ADM <em>FAMILIA</em></div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&larr; Ant.</button>
    <div class="month-label" id="monthLabel">-</div>
    <button onclick="changeMonth(1)">Sig. &rarr;</button>
  </div>
  <div class="sync-dot" id="syncDot">&bull; Conectando...</div>
</div>

<div class="stats-bar">
  <div class="sc">
    <div class="lbl">Total del mes</div>
    <div class="val" id="stTotal">-</div>
    <div class="sub" id="stUsd">-</div>
  </div>
  <div class="sc paid">
    <div class="lbl">&#10003; Pagado</div>
    <div class="val" id="stPaid">-</div>
    <div class="sub" id="stPaidPct">- items</div>
    <div class="pbar"><div class="pfill g" id="stPaidBar" style="width:0%"></div></div>
  </div>
  <div class="sc pend">
    <div class="lbl">Pendiente</div>
    <div class="val" id="stPend">-</div>
    <div class="sub" id="stPendCount">- items</div>
  </div>
  <div class="sc">
    <div class="lbl">Completado</div>
    <div class="val" id="stPct">-%</div>
    <div class="pbar"><div class="pfill g" id="stPctBar" style="width:0%"></div></div>
    <div class="sub" id="stItemCount">-</div>
  </div>
</div>

<div class="dollar-bar">
  <div class="rpill b"><span class="lbl">Blue</span><input type="number" id="rBlue" placeholder="-" oninput="onRateChange()"></div>
  <div class="rpill o"><span class="lbl">Oficial</span><input type="number" id="rOficial" placeholder="-" oninput="onRateChange()"></div>
  <div class="rpill m"><span class="lbl">MEP</span><input type="number" id="rMep" placeholder="-" oninput="onRateChange()"></div>
  <button class="btn-ref" onclick="fetchRates()">? Actualizar d?lar</button>
  <span id="lastUpdate"></span>
  <div class="dtotals">
    <span>Blue <strong id="dBlue">-</strong></span>
    <span>Oficial <strong id="dOficial">-</strong></span>
    <span>MEP <strong id="dMep">-</strong></span>
  </div>
</div>

<div class="alert-bar" id="alertBar"></div>

<div class="main">
  <div class="lp">
    <div class="ptitle">Gastos del mes</div>
    <div id="expCont"></div>
  </div>
  <div class="rp">
    <div class="rc">
      <h4>vs. Mes anterior</h4>
      <div id="compContent"><div style="color:#94a3b8;font-size:12px;text-align:center;padding:8px">Sin datos del mes anterior</div></div>
    </div>
    <div class="rc">
      <h4>Por categor?a</h4>
      <div style="position:relative;height:240px"><canvas id="catChart"></canvas></div>
    </div>
  </div>
</div>

<div class="footer">
  <button class="ba" onclick="exportData()">? Exportar JSON</button>
  <button class="ba" onclick="document.getElementById('impFile').click()">? Importar JSON</button>
  <input type="file" id="impFile" accept=".json" style="display:none" onchange="importData(event)">
  <button class="ba" onclick="window.print()">?? Imprimir</button>
  <span id="statusBar">-</span>
</div>

// -- STATE ---------------------------------------------------------------------
let cy = new Date().getFullYear(), cm = new Date().getMonth();
let curData = null, prevData = null;
let chartInst = null;
let curListener = null, prevListenerOff = null;
let writeTimer = null, ownWrite = false;
const expanded = new Set(CATS.map(c => c.key)); // all expanded by default

// -- HELPERS -------------------------------------------------------------------
function mk(y,m){ return `${y}-${String(m+1).padStart(2,'0')}`; }
function curK(){ return mk(cy,cm); }

function toArr(v){
  if(!v) return [];
  if(Array.isArray(v)) return v;
  return Object.values(v).filter(x => x && typeof x === 'object');
}

function isHistorical(key){
  const [y,m] = key.split('-').map(Number);
  const now = new Date();
  return y < now.getFullYear() || (y === now.getFullYear() && m < now.getMonth()+1);
}

function prepData(key, raw){
  const past = isHistorical(key);
  const out = {};
  CATS.forEach(c => {
    const items = toArr(raw ? raw[c.key] : null);
    out[c.key] = items.map(it => ({
      n: it.n||'',
      a: parseFloat(it.a)||0,
      paid: it.paid !== undefined ? !!it.paid : past
    }));
  });
  return out;
}

function fp(n){ return '$'+Math.round(n).toLocaleString('es-AR'); }
function fusd(n,r){ return r ? 'USD '+Math.round(n/r).toLocaleString('es-AR') : '-'; }
function catSum(items){ return (items||[]).reduce((s,i)=>s+(parseFloat(i.a)||0),0); }
function catPaid(items){ return (items||[]).filter(i=>i.paid).reduce((s,i)=>s+(parseFloat(i.a)||0),0); }
function paidCount(items){ return (items||[]).filter(i=>i.paid).length; }
function grandTotal(d){ return CATS.reduce((s,c)=>s+catSum(d[c.key]),0); }
function grandPaid(d){ return CATS.reduce((s,c)=>s+catPaid(d[c.key]),0); }
function getRates(){ return {blue:parseFloat(document.getElementById('rBlue').value)||null, ofic:parseFloat(document.getElementById('rOficial').value)||null, mep:parseFloat(document.getElementById('rMep').value)||null}; }

function setSyncStatus(st){
  const el = document.getElementById('syncDot');
  if(st==='ok'){el.textContent='* Sincronizado';el.className='sync-dot ok';}
  else if(st==='syncing'){el.textContent='* Guardando...';el.className='sync-dot syncing';}
  else if(st==='err'){el.textContent='* Sin conexion';el.className='sync-dot err';}
  else {el.textContent='* Conectando...';el.className='sync-dot';}
}
function setStatus(msg){ document.getElementById('statusBar').textContent = msg; }

// -- FIREBASE DATA -------------------------------------------------------------
function loadMonth(){
  const key = curK();
  setSyncStatus('connecting');

  if(curListener){ curListener(); curListener=null; }

  const ref = db.ref(`gastos/${key}`);
  const handler = ref.on('value', snap => {
    if(ownWrite){ return; }
    if(snap.exists()){
      curData = prepData(key, snap.val());
    } else {
      const raw = PRELOADED[key] || {};
      curData = prepData(key, raw);
      scheduleWrite(true);
    }
    setSyncStatus('ok');
    renderAll();
  }, () => {
    setSyncStatus('err');
    const raw = PRELOADED[key] || {};
    curData = prepData(key, raw);
    renderAll();
  });
  curListener = () => ref.off('value', handler);

  // Load prev month
  if(prevListenerOff){ prevListenerOff(); prevListenerOff=null; }
  let pm=cm-1, py=cy;
  if(pm<0){pm=11;py--;}
  const prevKey = mk(py,pm);
  const pref = db.ref(`gastos/${prevKey}`);
  const phandler = pref.on('value', snap => {
    if(snap.exists()){
      prevData = prepData(prevKey, snap.val());
    } else {
      const raw = PRELOADED[prevKey] || null;
      prevData = raw ? prepData(prevKey, raw) : null;
    }
    renderComp();
  });
  prevListenerOff = () => pref.off('value', phandler);
}

function scheduleWrite(immediate){
  clearTimeout(writeTimer);
  const delay = immediate ? 0 : 900;
  writeTimer = setTimeout(()=>{
    ownWrite = true;
    setSyncStatus('syncing');
    db.ref(`gastos/${curK()}`).set(curData)
      .then(()=>{ setSyncStatus('ok'); setStatus('Guardado en la nube - '+new Date().toLocaleTimeString('es-AR')); })
      .catch(()=>{ setSyncStatus('err'); setStatus('Error al guardar'); })
      .finally(()=>{ setTimeout(()=>{ ownWrite=false; },1500); });
  }, delay);
}

// -- RENDER EXPENSES -----------------------------------------------------------
function renderExpenses(){
  if(!curData) return;
  const cont = document.getElementById('expCont');
  cont.innerHTML='';
  CATS.forEach(cat => {
    const items = curData[cat.key]||[];
    const total = catSum(items);
    const paid = catPaid(items);
    const pct = total>0 ? Math.round(paid/total*100) : 0;
    const isOpen = expanded.has(cat.key);

    const block = document.createElement('div');
    block.className='cblock';

    // Header
    const hdr = document.createElement('div');
    hdr.className='chdr';
    hdr.innerHTML=`
      <span class="cdot" style="background:${cat.color}"></span>
      <span class="cname">${cat.name}</span>
      <div class="cright">
        <span class="ctotal">${fp(total)}</span>
        <span class="cpaidinfo">${fp(paid)} pagado ? ${pct}%</span>
        <div class="pbar cpbar"><div class="pfill g" style="width:${pct}%"></div></div>
      </div>
      <span class="cchev ${isOpen?'open':''}">?</span>`;
    hdr.onclick = () => {
      if(expanded.has(cat.key)) expanded.delete(cat.key); else expanded.add(cat.key);
      hdr.querySelector('.cchev').classList.toggle('open');
      body.classList.toggle('open');
    };

    // Body
    const body = document.createElement('div');
    body.className='cbody'+(isOpen?' open':'');

    const hdrRow = document.createElement('div');
    hdrRow.className='ihr';
    hdrRow.innerHTML='<span>Concepto</span><span style="text-align:right">Monto ($)</span><span style="text-align:center">Estado</span><span></span>';
    body.appendChild(hdrRow);

    items.forEach((item,idx)=>{
      const row = document.createElement('div');
      row.className='ir';
      row.innerHTML=`
        <input type="text" value="${(item.n||'').replace(/"/g,'&quot;')}" placeholder="Concepto" onchange="updName('${cat.key}',${idx},this.value)">
        <input type="number" value="${item.a||''}" placeholder="0" oninput="updAmt('${cat.key}',${idx},this.value)">
        <button class="pbtn ${item.paid?'paid':'pend'}" onclick="togglePaid('${cat.key}',${idx})">
          ${item.paid?'OK Pagado':'Pendiente'}
        </button>
        <button class="bdel" onclick="delItem('${cat.key}',${idx})" title="Eliminar">?</button>`;
      body.appendChild(row);
    });

    const addBtn = document.createElement('button');
    addBtn.className='badd';
    addBtn.textContent='+ Agregar ?tem';
    addBtn.onclick=()=>addItem(cat.key);
    body.appendChild(addBtn);

    block.appendChild(hdr);
    block.appendChild(body);
    cont.appendChild(block);
  });
}

// -- RENDER STATS --------------------------------------------------------------
function renderStats(){
  if(!curData) return;
  const total = grandTotal(curData);
  const paid = grandPaid(curData);
  const pend = total - paid;
  const pct = total>0 ? Math.round(paid/total*100) : 0;
  const r = getRates();

  const allItems = CATS.reduce((a,c)=>a+(curData[c.key]||[]).length,0);
  const paidItems = CATS.reduce((a,c)=>a+paidCount(curData[c.key]),0);
  const pendItems = allItems - paidItems;

  document.getElementById('stTotal').textContent = fp(total);
  document.getElementById('stUsd').textContent = r.blue ? '~ '+fusd(total,r.blue)+' blue' : '-';
  document.getElementById('stPaid').textContent = fp(paid);
  document.getElementById('stPaidPct').textContent = `${paidItems} de ${allItems} ?tems`;
  document.getElementById('stPaidBar').style.width = pct+'%';
  document.getElementById('stPend').textContent = fp(pend);
  document.getElementById('stPendCount').textContent = `${pendItems} ?tem${pendItems!==1?'s':''} sin pagar`;
  document.getElementById('stPct').textContent = pct+'%';
  document.getElementById('stPctBar').style.width = pct+'%';
  document.getElementById('stItemCount').textContent = `${paidItems}/${allItems} pagados`;

  // Dollar totals
  document.getElementById('dBlue').textContent = r.blue ? fusd(total,r.blue) : '-';
  document.getElementById('dOficial').textContent = r.ofic ? fusd(total,r.ofic) : '-';
  document.getElementById('dMep').textContent = r.mep ? fusd(total,r.mep) : '-';
}

// -- RENDER COMPARISON ---------------------------------------------------------
function renderComp(){
  const cont = document.getElementById('compContent');
  const alert = document.getElementById('alertBar');
  if(!prevData||!curData){
    cont.innerHTML='<div style="color:#94a3b8;font-size:12px;text-align:center;padding:8px">Sin datos del mes anterior</div>';
    alert.className='alert-bar'; return;
  }
  const cur = grandTotal(curData), prev = grandTotal(prevData);
  const diff = prev>0 ? (cur-prev)/prev*100 : null;
  let pm=cm-1; if(pm<0)pm=11;

  if(diff!==null){
    const up = diff>0;
    alert.className='alert-bar '+(up?'danger':'success');
    alert.innerHTML=`<strong>${up?'?':'?'} ${up?'Atenci?n':'Buenas noticias'}:</strong> Este mes gastaste <strong>${Math.abs(Math.round(diff))}% ${up?'m?s':'menos'}</strong> que ${MONTHS[pm]} (${fp(cur)} vs ${fp(prev)})`;
  }

  let html='';
  CATS.forEach(cat=>{
    const c=catSum(curData[cat.key]), p=catSum(prevData[cat.key]);
    if(c===0&&p===0) return;
    const pct = p>0 ? Math.round((c-p)/p*100) : null;
    const cls = pct===null?'sm':pct>0?'up':'dn';
    const lbl = pct===null?'-':(pct>0?'+':'')+pct+'%';
    html+=`<div class="crow">
      <span style="display:flex;align-items:center;gap:6px">
        <span style="width:8px;height:8px;border-radius:50%;background:${cat.color};display:inline-block"></span>
        <span>${cat.name}</span>
      </span>
      <span class="badge ${cls}">${lbl}</span>
    </div>`;
  });
  cont.innerHTML = html||'<div style="color:#94a3b8;font-size:12px">Sin variaciones</div>';
}

// -- RENDER CHART --------------------------------------------------------------
function renderChart(){
  if(!curData) return;
  const canvas = document.getElementById('catChart');
  if(chartInst){ chartInst.destroy(); chartInst=null; }
  chartInst = new Chart(canvas, {
    type:'bar',
    data:{
      labels: CATS.map(c=>c.name),
      datasets:[
        {
          label:'Pagado',
          data: CATS.map(c=>catPaid(curData[c.key])),
          backgroundColor: CATS.map(c=>c.color+'cc'),
          borderColor: CATS.map(c=>c.color),
          borderWidth:1.5, borderRadius:3
        },
        {
          label:'Pendiente',
          data: CATS.map(c=>catSum(curData[c.key])-catPaid(curData[c.key])),
          backgroundColor: CATS.map(c=>c.color+'44'),
          borderColor: CATS.map(c=>c.color+'88'),
          borderWidth:1, borderRadius:3
        }
      ]
    },
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:ctx=>' '+fp(ctx.parsed.x)}}},
      scales:{
        x:{stacked:true, grid:{color:'rgba(0,0,0,0.04)'}, ticks:{callback:v=>v===0?'0':'$'+Math.round(v/1000)+'k', font:{size:10}}},
        y:{stacked:true, grid:{display:false}, ticks:{font:{size:10}}}
      }
    }
  });
}

// -- RENDER ALL ----------------------------------------------------------------
function renderMonthLabel(){
  document.getElementById('monthLabel').textContent = MONTHS[cm]+' '+cy;
}

function renderAll(){
  renderMonthLabel();
  renderExpenses();
  renderStats();
  renderComp();
  renderChart();
}

// -- ITEM ACTIONS --------------------------------------------------------------
function updName(cat,idx,val){
  curData[cat][idx].n=val;
  scheduleWrite();
}
function updAmt(cat,idx,val){
  curData[cat][idx].a=parseFloat(val)||0;
  renderStats(); renderChart();
  // Update category total in DOM without full re-render
  scheduleWrite();
}
function togglePaid(cat,idx){
  curData[cat][idx].paid=!curData[cat][idx].paid;
  renderExpenses(); renderStats(); renderChart();
  scheduleWrite();
}
function addItem(cat){
  curData[cat].push({n:'',a:0,paid:false});
  renderExpenses(); renderStats(); renderChart();
  scheduleWrite();
}
function delItem(cat,idx){
  curData[cat].splice(idx,1);
  renderExpenses(); renderStats(); renderChart();
  scheduleWrite();
}

// -- NAVIGATION ----------------------------------------------------------------
function changeMonth(dir){
  cm+=dir;
  if(cm>11){cm=0;cy++;} if(cm<0){cm=11;cy--;}
  curData=null; prevData=null;
  renderMonthLabel();
  loadMonth();
}

// -- DOLLAR RATES --------------------------------------------------------------
function onRateChange(){ renderStats(); }

async function fetchRates(){
  document.getElementById('lastUpdate').textContent='Actualizando...';
  try{
    const r=await fetch('https://dolarapi.com/v1/dolares');
    const arr=await r.json();
    const f=casa=>arr.find(d=>d.casa?.toLowerCase()===casa);
    const b=f('blue'),o=f('oficial'),m=f('bolsa')||f('mep');
    if(b) document.getElementById('rBlue').value=b.venta;
    if(o) document.getElementById('rOficial').value=o.venta;
    if(m) document.getElementById('rMep').value=m.venta;
    document.getElementById('lastUpdate').textContent='Actualizado '+new Date().toLocaleTimeString('es-AR');
    onRateChange();
  }catch(e){
    document.getElementById('lastUpdate').textContent='Sin conexi?n';
  }
}

// -- EXPORT / IMPORT -----------------------------------------------------------
function exportData(){
  db.ref('gastos').once('value').then(snap=>{
    const data = snap.val()||{};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='ADM_Familia_'+new Date().toISOString().slice(0,10)+'.json';
    a.click();
  });
}

function importData(evt){
  const file=evt.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      db.ref('gastos').set(data).then(()=>{
        alert('Datos importados correctamente.');
        loadMonth();
      });
    }catch(err){ alert('Error al importar el archivo.'); }
  };
  reader.readAsText(file);
}

// -- INIT ----------------------------------------------------------------------
renderMonthLabel();
fetchRates();
loadMonth();
